name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
      working-directory: lib-rs
    - name: Run tests
      run: cargo test --verbose
      working-directory: lib-rs

  keyboard-fw-core:
    name: keyboard-fw core unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run host unit tests
      run: make test
      working-directory: keyboard-fw

  keyboard-fw-latency:
    name: keyboard-fw latency tool (macOS)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build + unit tests
      run: cargo test --verbose
      working-directory: keyboard-fw/latency-test
