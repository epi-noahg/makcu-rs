; LEFT MCU — USB device (plugs into target PC). ESP-IDF + TinyUSB.
; Keyboard firmware: relays the real keyboard transparently and overlays
; km.* injection. The portable injection core lives in ../core and is
; unit-tested on the host (see ../Makefile, ../test).
;
; Diag gates (UART0): -DCOM3_LOG=1 for verbose output; default is quiet.

[env:LEFT_KBD]
platform          = espressif32 @ 6.7.0
board             = MAKCM
framework         = espidf
board_build.partitions = partitions/partition_MAKCM.csv

build_flags =
  -DFIRMWARE_VERSION=\"V1_Kbd_IDF\"
  -DCOM3_LOG=0

; Latency/jitter measurement build. Adds the SIGTAP signal-tap (raw keyboard
; report timestamping on UART0) for the host tool in ../latency-test. Diag
; logs OFF so the wire carries only binary tap records; LAT_DIAG off to keep
; the measured path lean.
[env:LEFT_KBD_SIGTAP]
platform          = espressif32 @ 6.7.0
board             = MAKCM
framework         = espidf
board_build.partitions = partitions/partition_MAKCM.csv

build_flags =
  -DFIRMWARE_VERSION=\"V1_Kbd_IDF_SIGTAP\"
  -DCOM3_LOG=0
  -DLAT_DIAG=0
  -DSIGTAP=1
