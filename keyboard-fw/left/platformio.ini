; LEFT MCU — USB device (plugs into target PC). ESP-IDF + TinyUSB.
; Keyboard firmware: relays the real keyboard transparently and overlays
; km.* injection. The portable injection core lives in ../core and is
; unit-tested on the host (see ../Makefile, ../test).
;
; Diag gates (UART0): -DCOM3_LOG=1 for verbose output; default is quiet.

[env:LEFT_KBD]
platform          = espressif32 @ 6.7.0
board             = MAKCM
framework         = espidf
board_build.partitions = partitions/partition_MAKCM.csv

build_flags =
  -DFIRMWARE_VERSION=\"V1_Kbd_IDF\"
  -DCOM3_LOG=0
