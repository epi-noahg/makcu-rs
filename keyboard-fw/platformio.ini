; PlatformIO config for the keyboard firmware project.
;
; The portable core/ is unit-tested on the host. Locally the canonical runner
; is `make test` (needs only a C compiler). This `native` env is provided for
; CI parity / contributors who prefer PlatformIO + Unity.
;
; LEFT (USB device, ESP-IDF) and RIGHT (USB host, Arduino+IDF) live in
; ./left and ./right and are built from their own directories (Phases 5-6).

[platformio]
default_envs = native

[env:native]
platform = native
build_flags =
  -std=c11
  -Icore
test_framework = unity
test_filter = native/*
