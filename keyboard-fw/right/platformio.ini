; RIGHT MCU — USB host (the real keyboard plugs in here). Arduino + ESP-IDF
; usb_host. Reused verbatim from the controller passthrough: PassUsbHost is
; device-agnostic (snapshots descriptors, relays raw HID reports), so a
; keyboard flows through unchanged. No keyboard-specific code lives here —
; all injection happens on LEFT.

[env:RIGHT_KBD]
platform = espressif32 @ 6.7.0
board = MAKCM
framework = arduino
board_build.partitions = partitions/partition_MAKCM.csv

lib_deps =
  ArduinoJson
  locoduino/RingBuffer@^1.0.5

build_flags =
  -DUSB_IS_DEBUG=false
  -DFIRMWARE_VERSION="V1_Kbd"
  -I include
