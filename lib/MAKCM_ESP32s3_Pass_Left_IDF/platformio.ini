; LEFT MCU — USB device (plugs into target PC). ESP-IDF + TinyUSB.
; Two builds are produced from this same source by toggling COM3_LOG /
; KM_DIAG / KM_RING / LAT_DIAG via -D flags:
;   - Log:   defaults in source (verbose UART0 diag output)
;   - Quiet: -DCOM3_LOG=0 -DKM_DIAG=0 -DKM_RING=0 -DLAT_DIAG=0

[env:LEFT_IDF]
platform          = espressif32 @ 6.7.0
board             = MAKCM
framework         = espidf
board_build.partitions = partitions/partition_MAKCM.csv

build_flags =
  -DFIRMWARE_VERSION=\"V1_2_Pass_IDF\"
  -DCOM3_LOG=0
  ; XIM-fit gain curve constants live in km_inject.c (KM_GAIN_C, KM_GAIN_P).
  ; Override with -D here only when re-tuning.
