[env:RIGHT]
platform = espressif32 @ 6.7.0
board = MAKCM
framework = arduino
board_build.partitions = partitions/partition_MAKCM.csv

lib_deps =
  ArduinoJson
  locoduino/RingBuffer@^1.0.5

build_flags =
  -DUSB_IS_DEBUG=false
  -DFIRMWARE_VERSION="V1_2_Pass"
  -DCONTROLLER_TYPE_PASS=1
  -I include
